<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hostel Outing Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --panel-bg: rgba(25, 28, 41, 0.65);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #FF3366;
            --primary-glow: rgba(255, 51, 102, 0.4);
            --secondary: #00F0FF;
            --text-main: #FFFFFF;
            --text-muted: #8b92a5;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0; padding: 2rem;
            display: flex; flex-direction: column; align-items: center;
            background-image: radial-gradient(circle at top right, rgba(0, 240, 255, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(255, 51, 102, 0.1), transparent 40%);
            min-height: 100vh;
        }
        h1 { font-weight: 800; font-size: 3rem; margin-bottom: 2rem; 
             background: linear-gradient(90deg, var(--primary), var(--secondary));
             -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
             
        .container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 1000px; width: 100%;
        }
        
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        input {
            width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 16px;
            background: rgba(0,0,0,0.2); border: 1px solid var(--border-color);
            border-radius: 8px; color: white; font-family: 'Outfit', sans-serif; box-sizing: border-box;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--secondary); box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); }
        
        label { font-weight: 600; font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}
        
        .btn {
            padding: 12px 24px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
            font-family: 'Outfit'; font-size: 1rem; width: 100%; margin-bottom: 10px;
        }
        .btn-checkin { background: var(--secondary); color: #000; box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);}
        .btn-checkin:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0, 240, 255, 0.6);}
        .btn-checkout { background: var(--primary); color: #FFF; box-shadow: 0 0 15px var(--primary-glow);}
        .btn-checkout:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--primary-glow); }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: white; }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }
        
        .console {
            background: #000; font-family: monospace; border-radius: 12px;
            padding: 1rem; height: 150px; overflow-y: auto; font-size: 0.9rem; color: #0f0;
            border: 1px solid #333; margin-top: 20px;
        }
        
    </style>
</head>
<body>
    <h1>Hostel Monitor Pro</h1>
    <div class="container">
        <!-- Input Form -->
        <div class="glass-panel">
            <label>Registration Number</label>
            <input type="text" id="regNo" value="25XYZ9861" placeholder="Enter alphanumeric ID">
            
            <label>Time (24h format, e.g. 14.5)</label>
            <input type="text" id="timeVal" value="10.5" placeholder="e.g. 10.5 for 10:30 AM">
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn btn-checkout" onclick="sendAction('/api/checkout')">Record Outing</button>
                <button class="btn btn-checkin" onclick="sendAction('/api/checkin')">Record Return</button>
            </div>
        </div>
        
        <!-- Controls & Output -->
        <div class="glass-panel">
            <button class="btn btn-outline" onclick="fetchLog('/api/history')">Load Violation History (Queue)</button>
            <button class="btn btn-outline" onclick="fetchLog('/api/top')">Load Highest Violators (Max Heap)</button>
            <div class="console" id="terminalLog">
                System Initialized. DSA Web Core active...<br>
            </div>
        </div>
    </div>

    <script>
        function logMsg(msg) {
            const term = document.getElementById('terminalLog');
            term.innerHTML += "> " + msg + "<br>";
            term.scrollTop = term.scrollHeight;
        }

        async function sendAction(endpoint) {
            const reg = document.getElementById('regNo').value;
            const time = document.getElementById('timeVal').value;
            if(!reg || !time) { logMsg("Error: Please fill all fields."); return; }
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ regNo: reg, time: parseFloat(time) })
                });
                const data = await res.json();
                logMsg(data.message);
            } catch(e) {
                logMsg("Server connection error! Is C++ Backend Running?");
            }
        }
        
        async function fetchLog(endpoint) {
            try {
                const res = await fetch(endpoint);
                const data = await res.json();
                logMsg("--- " + data.title + " ---");
                if (data.lines.length === 0) logMsg("Nothing recorded yet.");
                data.lines.forEach(line => logMsg(line));
            } catch(e) { logMsg("Server error!"); }
        }
    </script>
</body>
</html>
